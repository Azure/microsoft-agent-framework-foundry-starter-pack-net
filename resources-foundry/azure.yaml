# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: microsoft-agent-framework-foundry-starter-pack-net

metadata:
  template: microsoft-agent-framework-foundry-starter-pack-net@1.0.0
  author: Justin Yoo
  description: Minimal Microsoft Foundry project with gpt-5-mini deployment using Azure Developer CLI

services:
  mcp-todo:
    project: ../src/MafStarterPack.McpTodo
    host: containerapp
    language: dotnet
    docker:
      path: ./Dockerfile
      context: .
      remoteBuild: true

hooks:
  postdeploy:
    posix:
      shell: sh
      run: ./scripts/post-deploy.sh
      interactive: false
    windows:
      shell: pwsh
      run: ./scripts/post-deploy.ps1
      interactive: false
