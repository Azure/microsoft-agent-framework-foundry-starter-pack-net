# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: microsoft-agent-framework-starter

metadata:
  template: microsoft-agent-framework-starter@1.0.0

requiredVersions:
  extensions:
    azure.ai.agents: ">=0.1.0-preview"

infra:
  provider: bicep
  path: ./infra

services:
  todo-agent:
    project: src/todo-agent
    host: azure.ai.agent
    language: docker
    docker:
      path: ./Dockerfile.azure
      remoteBuild: true
    config:
      container:
        resources:
          cpu: "0.25"
          memory: 0.5Gi
        scale:
          maxReplicas: 1
      deployments:
        - model:
            format: OpenAI
            name: gpt-5-mini
            version: "2025-08-07"
          name: gpt-5-mini
          sku:
            capacity: 10
            name: GlobalStandard
      startupCommand: dotnet run
