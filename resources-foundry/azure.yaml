# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
  extensions:
    azure.ai.agents: '>=0.1.0-preview'

name: microsoft-agent-framework-starter

metadata:
  template: microsoft-agent-framework-starter@1.0.0
  author: Justin Yoo
  description: Provision Microsoft Foundry Hosted Agent using Azure Developer CLI

infra:
  provider: bicep
  path: ./infra

services:
  todo-agent:
    project: src/todo-agent
    host: azure.ai.agent
    language: docker
    docker:
      remoteBuild: true
    config:
      container:
        resources:
          cpu: "0.25"
          memory: 0.5Gi
      deployments:
        - model:
            format: OpenAI
            name: gpt-5-mini
            version: "2025-08-07"
          name: gpt-5-mini
          sku:
            capacity: 10
            name: GlobalStandard
      startupCommand: dotnet run

hooks:
  preup:
    posix:
      shell: sh
      run: ./scripts/pre-provision.sh
      interactive: false
    windows:
      shell: pwsh
      run: ./scripts/pre-provision.ps1
      interactive: false

  preprovision:
    posix:
      shell: sh
      run: ./scripts/pre-provision.sh
      interactive: false
    windows:
      shell: pwsh
      run: ./scripts/pre-provision.ps1
      interactive: false

  postdeploy:
    posix:
      shell: sh
      run: ./scripts/post-deploy.sh
      interactive: false
    windows:
      shell: pwsh
      run: ./scripts/post-deploy.ps1
      interactive: false
